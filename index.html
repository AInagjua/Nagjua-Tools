<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nagjua Group — Internal Tools</title>
<style>
  :root{
    --navy:#0F1B2D;
    --navy-2:#16273F;
    --gold:#C9A227;
    --gold-soft:#E4C864;
    --paper:#F4F5F7;
    --ink:#1A2233;
    --muted:#66707F;
    --line:#E1E4E9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    font-family:"Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    color:var(--ink);
  }
  header{
    background:linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%);
    padding:36px 24px 30px;
    text-align:center;
    border-bottom:3px solid var(--gold);
  }
  header .eyebrow{
    color:var(--gold-soft);
    letter-spacing:3px;
    font-size:11px;
    font-weight:600;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  header h1{
    color:#fff;
    font-size:26px;
    margin:0;
    font-weight:600;
    letter-spacing:0.3px;
  }
  header p{
    color:#B7C0CE;
    font-size:13px;
    margin:8px 0 0;
  }
  main{
    max-width:760px;
    margin:0 auto;
    padding:32px 20px 60px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:16px;
  }
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    padding:20px 20px 18px;
    text-decoration:none;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    gap:10px;
    transition:border-color .15s ease, box-shadow .15s ease, transform .15s ease;
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width:4px;
    background:var(--gold);
    opacity:0;
    transition:opacity .15s ease;
  }
  .card:hover{
    border-color:var(--navy);
    box-shadow:0 6px 18px rgba(15,27,45,0.08);
    transform:translateY(-2px);
  }
  .card:hover::before{opacity:1;}
  .card .name{
    font-size:16px;
    font-weight:600;
    color:var(--navy);
  }
  .card .desc{
    font-size:13px;
    color:var(--muted);
    line-height:1.5;
    flex-grow:1;
  }
  .card .open{
    font-size:12px;
    font-weight:600;
    color:var(--gold);
    letter-spacing:0.4px;
    text-transform:uppercase;
  }
  .empty-note{
    margin-top:28px;
    font-size:12px;
    color:var(--muted);
    text-align:center;
  }
  footer{
    text-align:center;
    padding:20px;
    font-size:11px;
    color:var(--muted);
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Nagjua Group</div>
  <h1>Internal Tools</h1>
  <p>AI Nagjua - Shared Tools</p>
</header>

<main>
  <div class="grid">
    <a class="card" href="Client_Flat_Ledger_Search.html">
      <div class="name">Client &amp; Flat Ledger Search</div>
      <div class="desc">Search a client name or flat number across all uploaded bank ledgers. Shared live data for everyone.</div>
      <div class="open">Open tool →</div>
    </a>
  </div>

  <div class="empty-note">More tools will appear here as they're added.</div>
</main>

<footer>Nagjua Group — Finance &amp; Accounts</footer>

</body>
</html>
